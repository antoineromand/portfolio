<header>
  <nav>
    <div class="title">
      ANTOINE ROMAND
    </div>

    <div class="hidden md:flex items-center gap-12 font-serif tracking-widest uppercase text-sm">
      <ul>
        <li>
          <a
            [routerLink]="['/']"
            routerLinkActive="active-link"
            [routerLinkActiveOptions]="{exact:true}"
          >
            Accueil
          </a>
        </li>
        <li><a
          [routerLink]="['/projects']"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="{exact:true}"
        >
          Projets</a></li>
        <li><a
          [routerLink]="['/about']"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="{exact:true}"
        >
          Présentation</a></li>
        <li><a
          [routerLink]="['/contact']"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="{exact:true}"
        >
          Contact</a></li>
      </ul>
    </div>

    <button
      type="button"
      class="md:hidden burger-btn"
      (click)="isMenuOpen = !isMenuOpen"
      aria-label="Ouvrir le menu"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="size-6"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
        />
      </svg>
    </button>
  </nav>

  <div class="mobile-menu md:hidden" [class.open]="isMenuOpen">
    <ul>
      <li><a [routerLink]="['/']" (click)="closeMenu()" routerLinkActive="active-link"
             [routerLinkActiveOptions]="{exact:true}">Accueil</a></li>
      <li><a [routerLink]="['/projects']" (click)="closeMenu()" routerLinkActive="active-link"
             [routerLinkActiveOptions]="{exact:true}">Projets</a></li>
      <li><a [routerLink]="['/about']" (click)="closeMenu()" routerLinkActive="active-link"
             [routerLinkActiveOptions]="{exact:true}">Présentation</a></li>
      <li><a [routerLink]="['/contact']" (click)="closeMenu()" routerLinkActive="active-link"
             [routerLinkActiveOptions]="{exact:true}">Contact</a></li>
    </ul>
  </div>
</header>
