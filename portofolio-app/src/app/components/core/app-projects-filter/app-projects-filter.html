<div class="relative mt-12 py-3">
  <div class="flex justify-between">
    <div class="w-2/5">
      <label class="mono text-[10px] tracking-[0.3em] uppercase opacity-40 block mb-4">Filtres de recherche</label>
      <div class="relative group">
        <input (input)="updateQuery($event)"
               class="w-full bg-transparent border-0 border-b border-outline-variant/40 py-2 mono text-[11px] tracking-widest placeholder:opacity-20 focus:ring-0 focus:border-on-surface transition-colors duration-500 uppercase"
               placeholder="SEARCH BY TAGS (E.G. RUST, GRPC)..." type="text"/>
        <span
          class="material-symbols-outlined absolute right-0 top-1.5 text-sm opacity-20 group-focus-within:opacity-100 transition-opacity">search</span>
      </div>
    </div>
    <div class="flex items-center space-x-12">
      <div class="flex flex-col items-end">
        <label class="mono text-[10px] tracking-[0.3em] uppercase opacity-40 mb-2">Sequence</label>
        <select (change)="selectOrderById($event)"
                class="minimal-select bg-transparent border-0 mono text-[11px] tracking-widest uppercase cursor-pointer py-1 pr-8 focus:ring-0">
          <option value="ASC">ORDER BY ID [ASC]</option>
          <option value="DESC">ORDER BY ID [DESC]</option>
        </select>
      </div>
    </div>
  </div>
  <div class="absolute bottom-0 border-b-2 w-full opacity-30"></div>
</div>
