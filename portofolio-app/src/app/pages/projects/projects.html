<div class="home-container flex-1 px-6 md:px-12 lg:px-20">
  <div class="head-container">
    <div class="page-header">
      <span class="main-quote">Roses are red, Java is blue.</span>
      <span class="sub-quote">Enfin, je crois ?</span>
    </div>
    <p class="resume">Vous retrouverez ici certains de mes projets à but éducatif. N'hésitez pas à aller sur mon
      github.</p>
  </div>
  <app-projects-filter (filterOutputEvent)="getFilters($event)" )></app-projects-filter>
  @for (project of projects; track project.id) {
    <app-project [project]="project"></app-project>
  }
</div>
